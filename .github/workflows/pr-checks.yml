name: Code Checks

on:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "main"

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playwright-tests:
    name: Playwright tests
    runs-on: ubuntu-latest
    timeout-minutes: 20 # prevents long-running tests

    env:
      CI: true

    strategy:
      matrix:
        project: [visual, accessibility]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build design system and documentation
        run: npm run grove:build && npm run storybook:build

      # get playwright version from package.json for cache key
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package.json').devDependencies['@playwright/test']")" >> $GITHUB_OUTPUT

      # cache playwright browsers to speed up workflow
      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      # install playwright browsers if cache is not hit
      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install chromium --force

      # install system dependencies (always run, even on cache hit)
      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      # start a static server to serve the built storybook
      - name: Start static server
        run: |
          npx http-server ./storybook-static -p 6006 &
          echo $! > server.pid

      # separate step to wait for the server to be ready before running tests
      - name: Wait for server
        run: npx wait-on http://localhost:6006

      - name: Run ${{ matrix.project }} tests
        run: npx playwright test --project=${{ matrix.project }}

      # if the tests fail, upload the Playwright artifacts for debugging
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/

      # cleanup step to stop the server after tests are done, regardless of success or failure
      - name: Stop server
        if: always()
        run: kill $(cat server.pid)

  build:
    name: Health tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check Prettier formatting
        run: npm run format:check

      - name: Check Linting
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Check Typescript
        run: npx tsc --noEmit

      # Make sure the grove:build command runs successfully
      - name: Test run grove:build
        run: npm run grove:build

      # run storybook:build with retry to avoid random failures
      - name: Test run storybook:build (with retry)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: npm run storybook:build
